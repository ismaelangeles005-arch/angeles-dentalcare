<!DOCTYPE html>
<!-- saved from url=(0071)file:///C:/Users/marlo/OneDrive/Escritorio/angeles_dentalcare_logo.html -->
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Angeles DentalCare — Logo</title>
<link href="./logo_files/css2" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #185FA5; /* Cambia este valor al azul exacto de tu pagina */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .logo-wrap { padding: 40px; }

  .logo-group { animation: fadeInUp 1.2s cubic-bezier(0.22,1,0.36,1) both; }
  .icon-group { animation: scaleIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
  .text-main  { animation: slideRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both; }
  .text-sub   { animation: slideRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.7s both; }
  .accent-line{ animation: expandLine 0.8s cubic-bezier(0.22,1,0.36,1) 0.9s both; transform-origin: left center; }
  .dot-anim   { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.1s both; }
  .tagline    { animation: fadeInUp 1s ease 1.2s both; }

  @keyframes fadeInUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes scaleIn    { from{opacity:0;transform:scale(0.4)} to{opacity:1;transform:scale(1)} }
  @keyframes slideRight { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
  @keyframes expandLine { from{transform:scaleX(0)} to{transform:scaleX(1)} }
  @keyframes popIn      { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

  .shine-tooth { animation: shineMove 3.5s ease-in-out 1.8s infinite; }
  @keyframes shineMove {
    0%,100% { opacity:0; transform:translateX(-30px); }
    40%,55% { opacity:0.7; transform:translateX(20px); }
    70%     { opacity:0; transform:translateX(50px); }
  }
</style>
</head>
<body>
<div class="logo-wrap">
<svg id="logo" width="560" height="260" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
  <title>Angeles DentalCare</title>
  <defs>
    <clippath id="toothClip">
      <path d="M340 85 Q356 72 372 85 Q386 98 379 122 Q372 146 361 160 Q355 168 340 160 Q325 168 319 160 Q308 146 301 122 Q294 98 308 85 Q324 72 340 85 Z"></path>
    </clippath>
  </defs>

  <g class="logo-group">
    <g class="icon-group" transform="translate(340,122)">
      <path d="M-46 -4 Q-68 -22 -80 -7 Q-68 4 -46 3 Z" fill="white" opacity="0.5"></path>
      <path d="M-46 3 Q-72 10 -78 26 Q-62 20 -46 10 Z" fill="white" opacity="0.35"></path>
      <path d="M46 -4 Q68 -22 80 -7 Q68 4 46 3 Z" fill="white" opacity="0.5"></path>
      <path d="M46 3 Q72 10 78 26 Q62 20 46 10 Z" fill="white" opacity="0.35"></path>
      <path d="M0 -37 Q20 -50 34 -37 Q50 -22 42 6 Q32 32 18 47 Q9 56 0 47 Q-9 56 -18 47 Q-32 32 -42 6 Q-50 -22 -34 -37 Q-20 -50 0 -37 Z" fill="white"></path>
      <path d="M0 -37 Q20 -50 34 -37 Q50 -22 42 6 Q32 32 18 47 Q9 56 0 47 Q-9 56 -18 47 Q-32 32 -42 6 Q-50 -22 -34 -37 Q-20 -50 0 -37 Z" fill="#B5D4F4" opacity="0.18"></path>
      <line x1="0" y1="-12" x2="0" y2="48" stroke="#B5D4F4" stroke-width="1.5" opacity="0.6"></line>
      <rect class="shine-tooth" x="-9" y="-35" width="7" height="65" rx="3.5" fill="white" opacity="0" clip-path="url(#toothClip)"></rect>
      <rect x="-3.5" y="-62" width="7" height="18" rx="3.5" fill="white" opacity="0.9"></rect>
      <rect x="-9" y="-57" width="18" height="7" rx="3.5" fill="white" opacity="0.9"></rect>
    </g>

    <g class="text-main">
      <text x="340" y="208" font-family="&#39;Cormorant Garamond&#39;, Georgia, serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="5">ANGELES</text>
    </g>

    <g transform="translate(340,218)">
      <rect class="accent-line" x="-115" y="0" width="230" height="1.5" rx="1" fill="white" opacity="0.5"></rect>
      <circle class="dot-anim" cx="-123" cy="0.75" r="3.5" fill="white" opacity="0.7"></circle>
      <circle class="dot-anim" cx="123" cy="0.75" r="3.5" fill="white" opacity="0.7"></circle>
    </g>

    <g class="text-sub">
      <text x="340" y="244" font-family="&#39;Jost&#39;, Arial, sans-serif" font-size="16" font-weight="300" fill="white" text-anchor="middle" letter-spacing="10" opacity="0.9">DENTALCARE</text>
    </g>

    <text class="tagline" x="340" y="268" font-family="&#39;Jost&#39;, Arial, sans-serif" font-size="10" font-weight="400" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.65">
      Tu sonrisa, nuestra pasion
    </text>
  </g>
</svg>
</div>


</body></html>