<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Angeles DentalCare</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial,sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient( 135deg, #2563eb, #1e3a8a );
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND */

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: float 8s infinite ease-in-out;
        }

        .circle1 {
            width: 300px;
            height: 300px;
            top: -80px;
            left: -80px;
        }

        .circle2 {
            width: 250px;
            height: 250px;
            bottom: -60px;
            right: -60px;
            animation-delay: 2s;
        }

        .circle3 {
            width: 180px;
            height: 180px;
            top: 40%;
            left: 10%;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* LOGIN */

        .login-box {
            width: 430px;
            max-width: 95%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: white;
        }

        /* LOGO */

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

            .logo svg {
                width: 170px;
            }

        .logo-title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .logo-sub {
            letter-spacing: 7px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* WELCOME */

        .welcome {
            text-align: center;
            margin-bottom: 25px;
        }

            .welcome h2 {
                margin-bottom: 10px;
            }

            .welcome p {
                opacity: 0.9;
            }

        /* INPUTS */

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

            .input-group i {
                position: absolute;
                top: 16px;
                left: 15px;
                color: #6b7280;
            }

            .input-group input {
                width: 100%;
                padding: 15px 15px 15px 45px;
                border: none;
                border-radius: 15px;
                outline: none;
                font-size: 15px;
            }

        /* BUTTON */

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: white;
            color: #2563eb;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

            .login-btn:hover {
                transform: translateY(-3px);
            }

        /* TEST USERS */

        .users-box {
            margin-top: 25px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
        }

            .users-box h3 {
                margin-bottom: 15px;
            }

        .user-item {
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>
    <div class="bg-circle circle3"></div>

    <!-- LOGIN -->

    <div class="login-box">

        <!-- LOGO -->

        <div class="logo">

            <svg viewBox="0 0 680 300"
                 xmlns="http://www.w3.org/2000/svg">

                <g transform="translate(340,122)">

                    <path d="M0 -37 Q20 -50 34 -37 Q50 -22 42 6 Q32 32 18 47 Q9 56 0 47 Q-9 56 -18 47 Q-32 32 -42 6 Q-50 -22 -34 -37 Q-20 -50 0 -37 Z"
                          fill="white" />

                </g>

            </svg>

            <div class="logo-title">
                ANGELES
            </div>

            <div class="logo-sub">
                DENTALCARE
            </div>

        </div>

        <!-- WELCOME -->

        <div class="welcome">

            <h2>
                Bienvenido
            </h2>

            <p>
                Sistema inteligente odontológico
            </p>

        </div>

        <!-- USER -->

        <div class="input-group">

            <i class="fa-solid fa-user"></i>

            <input type="text"
                   id="usuario"
                   placeholder="Usuario">

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   id="password"
                   placeholder="Contraseña"
                   onkeypress="if(event.key==='Enter'){login()}">

        </div>

        <!-- BUTTON -->

        <button class="login-btn"
                onclick="login()">

            Ingresar

        </button>

        <!-- TEST USERS -->

        <div class="users-box">

            <h3>
                Usuarios Demo
            </h3>

            <div class="user-item">
                👑 admin / 1234
            </div>

            <div class="user-item">
                👨‍⚕️ doctor1 / 1234
            </div>

            <div class="user-item">
                👩‍💼 recepcion / 1234
            </div>

        </div>

    </div>

    <script>

        function login() {

            let usuario =
                document.getElementById(
                    "usuario"
                ).value;

            let password =
                document.getElementById(
                    "password"
                ).value;

            if (
                usuario === "" ||
                password === ""
            ) {

                alert(
                    "Completa todos los campos"
                );

                return;

            }

            /* ADMIN */

            if (
                usuario === "admin" &&
                password === "1234"
            ) {

                localStorage.setItem(
                    "rol",
                    "admin"
                );

                window.location.href =
                    "dashboard.html";

            }

            /* DOCTOR */

            else if (
                usuario === "doctor1" &&
                password === "1234"
            ) {

                localStorage.setItem(
                    "rol",
                    "doctor"
                );

                localStorage.setItem(
                    "doctor",
                    "Dr. Gómez"
                );

                window.location.href =
                    "dashboard.html";

            }

            /* RECEPCION */

            else if (
                usuario === "recepcion" &&
                password === "1234"
            ) {

                localStorage.setItem(
                    "rol",
                    "recepcion"
                );

                window.location.href =
                    "dashboard.html";

            }

            else {

                alert(
                    "Usuario o contraseña incorrectos"
                );

            }

        }

    </script>

</body>
</html>
